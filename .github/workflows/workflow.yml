name: PR Check

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [common-module]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:build

      - name: Tests and coverage check for ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:test :${{ matrix.service }}:jacocoTestReport :${{ matrix.service }}:jacocoTestCoverageVerification